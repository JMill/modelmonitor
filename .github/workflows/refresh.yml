name: refresh

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: modelmonitor-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Refresh manifest
        run: npx tsx scripts/check-models.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit manifest if changed
        run: |
          if ! git diff --quiet docs/models.json; then
            git config user.name  "modelmonitor[bot]"
            git config user.email "modelmonitor@users.noreply.github.com"
            git add docs/models.json
            git commit -m "chore: refresh model manifest"
            git push
          else
            echo "No manifest changes."
          fi

      - name: Open bump PRs
        if: success()
        run: npx tsx scripts/open-bump-prs.ts
        env:
          BUMP_PR_TOKEN: ${{ secrets.BUMP_PR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `modelmonitor refresh failed on ${new Date().toISOString().slice(0,10)}`,
              body:  `Workflow run failed.\n\nRun: ${runUrl}`,
              labels: ['modelmonitor', 'bug'],
            });
